<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- Background -->
  <rect width="300" height="300" fill="#f4f7f9" rx="40" ry="40"/>
  
  <!-- Abstract Brain/Connection Concept -->
  <path d="M150 100 
           Q200 70, 240 110 
           Q280 150, 240 190 
           Q200 230, 150 200 
           Q100 230, 60 190 
           Q20 150, 60 110 
           Q100 70, 150 100" 
        fill="#4A90E2" stroke="#2C3E50" stroke-width="4"/>
  
  <!-- Sentiment Indicators -->
  <circle cx="110" cy="130" r="20" fill="#FF6B6B"/>
  <circle cx="190" cy="130" r="20" fill="#2ECC71"/>
  
  <!-- Data Flow Lines -->
  <path d="M100 220 Q150 260, 200 220" 
        fill="none" stroke="#2C3E50" stroke-width="3" stroke-dasharray="6,6"/>
</svg>
