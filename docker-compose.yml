version: "3.8"
services:
  sentiment-backend:
    image: sentiment-backend:latest
    build:
      context: ./sentiment-analyzer-backend/sentiment-analyzer-backend/
    ports:
      - "8000:8000"
    networks:
      - sentiment-network
    environment:
      - CLERK_ISSUER=${CLERK_ISSUER}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-sentiment-backend,localhost}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
  sentiment-analyzer:
    image: sentiment-analyzer:latest
    build:
      context: ./sentiment-analyzer-frontend
      args:
        # Must be browser-reachable — NOT the internal Docker hostname,
        # since this gets inlined into client-side JS at build time.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/analyze/}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - sentiment-backend
    networks:
      - sentiment-network
    environment:
      - MONGODB_URL=${MONGODB_URL}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
networks:
  sentiment-network:
    driver: bridge
